<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="820" height="420" fill="#fcfcfb"/>

  <text x="410" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#0b0b0b">シカゴ(オヘア)-東京間 直行便数比較(2027年3月時点)</text>
  <text x="410" y="56" text-anchor="middle" font-size="13" fill="#52514e">AA参入後、同区間は合計6便/日体制に。AAは最後発かつ最少便数での参入</text>

  <!-- gridlines -->
  <line x1="230" y1="80" x2="230" y2="360" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="480" y1="80" x2="480" y2="360" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="230" y1="360" x2="730" y2="360" stroke="#c3c2b7" stroke-width="2"/>
  <text x="230" y="378" text-anchor="middle" font-size="12" fill="#898781">0便</text>
  <text x="480" y="378" text-anchor="middle" font-size="12" fill="#898781">1便</text>
  <text x="730" y="378" text-anchor="middle" font-size="12" fill="#898781">2便</text>

  <!-- JAL: 2 -->
  <text x="220" y="106" text-anchor="end" font-size="14" font-weight="600" fill="#0b0b0b">JAL</text>
  <text x="220" y="122" text-anchor="end" font-size="11" fill="#52514e">NRT-ORD・HND-ORD</text>
  <rect x="230" y="86" width="500" height="36" fill="#2a78d6" rx="3"/>
  <text x="742" y="109" font-size="14" font-weight="700" fill="#0b0b0b">2便/日</text>

  <!-- ANA: 1 -->
  <text x="220" y="176" text-anchor="end" font-size="14" font-weight="600" fill="#0b0b0b">ANA</text>
  <text x="220" y="192" text-anchor="end" font-size="11" fill="#52514e">HND-ORD</text>
  <rect x="230" y="156" width="250" height="36" fill="#eda100" rx="3"/>
  <text x="492" y="179" font-size="14" font-weight="700" fill="#0b0b0b">1便/日</text>

  <!-- United: 2 -->
  <text x="220" y="246" text-anchor="end" font-size="14" font-weight="600" fill="#0b0b0b">ユナイテッド</text>
  <text x="220" y="262" text-anchor="end" font-size="11" fill="#52514e">HND-ORD・ORD-NRT(新設)</text>
  <rect x="230" y="226" width="500" height="36" fill="#1baf7a" rx="3"/>
  <text x="742" y="249" font-size="14" font-weight="700" fill="#0b0b0b">2便/日</text>

  <!-- AA: 1 -->
  <text x="220" y="316" text-anchor="end" font-size="14" font-weight="600" fill="#0b0b0b">AA(新設)</text>
  <text x="220" y="332" text-anchor="end" font-size="11" fill="#52514e">ORD-NRT・2027年3月27日〜</text>
  <rect x="230" y="296" width="250" height="36" fill="#e34948" rx="3"/>
  <text x="492" y="319" font-size="14" font-weight="700" fill="#0b0b0b">1便/日</text>

  <text x="410" y="404" text-anchor="middle" font-size="12" fill="#898781">出典:United公式プレスリリース(2026-05-14)、JALプレスリリース、AA公式ニュースルーム(2026-07-01)</text>
</svg>
